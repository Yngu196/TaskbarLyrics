name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg (official action)
        uses: microsoft/setup-vcpkg@v1

      - name: Install dependencies
        run: vcpkg install --triplet x64-windows ixwebsocket nlohmann-json zlib mbedtls

      - name: Configure CMake
        run: |
          $vcpkgInstalled = "${{ github.workspace }}\vcpkg_installed\x64-windows"
          cmake -B build -S . `
            "-DVCPKG_INSTALLED_DIR=$vcpkgInstalled" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoeKoeTaskbarLyrics-x64
          path: |
            build/Release/MoeKoeTaskbarLyrics.exe
            build/Release/WebView2Loader.dll
            build/Release/z.dll
            resources/settings.html
            resources/icon.ico
