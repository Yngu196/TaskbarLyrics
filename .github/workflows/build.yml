name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (vcpkg)
        shell: powershell
        run: |
          $vcpkgRoot = "${{ github.workspace }}\vcpkg"

          if (!(Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            git -C $vcpkgRoot checkout 75672db6bd812b060482b0f00b5a16b18a0c0f07
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          & "$vcpkgRoot\vcpkg.exe" install ixwebsocket nlohmann-json zlib mbedtls kissfft --triplet x64-windows --classic
          if ($LASTEXITCODE -ne 0) { exit 1 }

          $installDir = "$vcpkgRoot\installed\x64-windows"
          Write-Host "VCPKG_INSTALLED_DIR=$installDir"
          echo "VCPKG_INSTALLED_DIR=$installDir" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: powershell
        run: |
          cmake -B build -S . `
            "-DVCPKG_INSTALLED_DIR=$env:VCPKG_INSTALLED_DIR" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -- /v:minimal

      - name: Copy VC++ Redist DLLs
        shell: powershell
        run: |
          # 从编译器路径推导 VC Redist CRT 目录
          $clPath = (Get-Command cl.exe -ErrorAction SilentlyContinue).Source
          if ($clPath) {
            # cl.exe: .../VC/Tools/MSVC/<ver>/bin/Hostx64/x64/cl.exe
            $vcRoot = (Split-Path (Split-Path (Split-Path (Split-Path (Split-Path $clPath)))))  # .../VC
            $msvcVer = (Split-Path (Split-Path (Split-Path (Split-Path $clPath))) | Split-Path -Leaf)  # <ver>
            $crtDir = Join-Path $vcRoot "Redist\MSVC\$msvcVer\x64\Microsoft.VC143.CRT"
            if (!(Test-Path $crtDir)) {
              $crtDir = Join-Path $vcRoot "Redist\MSVC\$msvcVer\onecore\x64\Microsoft.VC143.CRT"
            }
            if (Test-Path $crtDir) {
              Write-Host "Copying VC++ CRT DLLs from: $crtDir"
              Copy-Item -Path "$crtDir\msvcp140.dll" -Destination "moeKoe-taskbar-lyrics\" -Force
              Copy-Item -Path "$crtDir\vcruntime140.dll" -Destination "moeKoe-taskbar-lyrics\" -Force
              Copy-Item -Path "$crtDir\vcruntime140_1.dll" -Destination "moeKoe-taskbar-lyrics\" -Force
              Write-Host "VC++ CRT DLLs copied successfully"
            } else {
              Write-Host "WARNING: VC++ CRT directory not found at $crtDir"
              # Fallback: search System32
              $sys32 = "$env:SystemRoot\System32"
              foreach ($dll in @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")) {
                $src = Join-Path $sys32 $dll
                if (Test-Path $src) {
                  Copy-Item -Path $src -Destination "moeKoe-taskbar-lyrics\" -Force
                  Write-Host "Copied $dll from System32"
                }
              }
            }
          } else {
            Write-Host "WARNING: cl.exe not found, cannot locate VC++ Redist"
          }

      - name: Package for artifact
        shell: powershell
        run: |
          # upload-artifact@v4 会多包一层 zip，所以需要把插件目录塞进中间父目录
          # 这样 artifact zip 内部就是: moeKoe-taskbar-lyrics/manifest.json (深度=2)
          # 恰好符合 MoeKoeMusic installPluginFromZip 的检测规则
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item -Path moeKoe-taskbar-lyrics -Destination artifact/moeKoe-taskbar-lyrics -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoeKoeTaskbarLyrics-x64
          path: artifact/
