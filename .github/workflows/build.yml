name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install WebView2 SDK (NuGet)
        shell: powershell
        run: |
          nuget install Microsoft.Web.WebView2 -Version 1.0.3856.49 -OutputDirectory "${{ github.workspace }}\packages"
          # 验证关键文件是否存在
          $libPath = "${{ github.workspace }}\packages\Microsoft.Web.WebView2.1.0.3856.49\build\native\x64\WebView2Loader.lib"
          $incPath = "${{ github.workspace }}\packages\Microsoft.Web.WebView2.1.0.3856.49\build\native\include\WebView2.h"
          if (-not (Test-Path $libPath)) {
            Write-Host "ERROR: WebView2Loader.lib NOT found at $libPath"
            Write-Host "Listing NuGet package contents:"
            Get-ChildItem -Recurse "${{ github.workspace }}\packages" | Select-Object FullName | Format-Table -AutoSize
            exit 1
          }
          if (-not (Test-Path $incPath)) {
            Write-Host "ERROR: WebView2.h NOT found at $incPath"
            exit 1
          }
          Write-Host "WebView2 SDK verified OK"

      - name: Install dependencies (auto-retry on network issues)
        shell: powershell
        run: |
          # Use VS 2022's fully bootstrapped vcpkg
          $vcpkgRoot = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\vcpkg"
          $vcpkg = "$vcpkgRoot\vcpkg.exe"
          
          # Create vcpkg-configuration.json with builtin registry and baseline commit SHA
          @"
          {
            "default-registry": {
              "kind": "builtin",
              "baseline": "75672db6bd812b060482b0f00b5a16b18a0c0f07"
            }
          }
          "@ | Out-File -FilePath "${{ github.workspace }}\vcpkg-configuration.json" -Encoding utf8
          
          $maxRetries = 3
          for ($i = 0; $i -lt $maxRetries; $i++) {
              & $vcpkg install --triplet x64-windows --vcpkg-root="$vcpkgRoot" --x-install-root="${{ github.workspace }}\vcpkg_installed"
              if ($LASTEXITCODE -eq 0) { break }
              Write-Host "Retry $($i+1)/$maxRetries..."
              Start-Sleep -Seconds 5
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Configure CMake
        shell: powershell
        run: |
          # 只传目录路径，让 CMake 的 find_library/find_path 自己搜索文件
          $webview2Dir = "${{ github.workspace }}\packages\Microsoft.Web.WebView2.1.0.3856.49"
          cmake -B build -S . `
            "-DVCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg_installed\x64-windows" `
            "-DWEBVIEW2_INCLUDE_DIR=$webview2Dir\build\native\include" `
            "-DWEBVIEW2_LOADER_DIR=$webview2Dir\build\native\x64" `
            -DCMAKE_BUILD_TYPE=Release `
            --log-level=VERBOSE 2>&1 | Select-String -Pattern "WEBVIEW2|WebView2|webview2|NOTFOUND|error"

      - name: Build
        run: cmake --build build --config Release -- /v:minimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoeKoeTaskbarLyrics-x64
          path: |
            build/Release/MoeKoeTaskbarLyrics.exe
            build/Release/WebView2Loader.dll
            build/Release/z.dll
            resources/settings.html
            resources/icon.ico
